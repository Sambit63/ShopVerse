<!DOCTYPE html>
<html>
  <head>
    <title>Dark-themed Google Map with Leaflet</title>
    <style>
      #map {
        height: 400px;
        width: 100%;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  </head>
  <body>
    <div id="map"></div>
    <script>
      var map = L.map("map").setView([51.505, -0.09], 13);
      L.tileLayer(
        "https://maps.googleapis.com/maps/api/tile?key=AIzaSyAFJDYojE9yFulodcZuPmUbHfyTZJ7zQ2U",
        {
          maxZoom: 18,
        }
      ).addTo(map);
    </script>
  </body>
</html>
