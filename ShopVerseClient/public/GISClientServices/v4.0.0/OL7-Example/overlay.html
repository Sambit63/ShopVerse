<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>OpenLayers 7 Overlay Icons Example</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@7.3.0/dist/ol.css" />
    <style>
      .map {
        width: 100%;
        height: 400px;
      }
    </style>
  </head>
  <body>
    <div id="map" class="map"></div>
    <script src="https://cdn.jsdelivr.net/npm/ol@7.3.0/dist/ol.js"></script>
    <script>
      // Create the map
      const map = new ol.Map({
        target: "map",
        layers: [
          new ol.layer.Tile({
            source: new ol.source.OSM(),
          }),
        ],
        view: new ol.View({
          center: ol.proj.fromLonLat([0, 0]),
          zoom: 2,
        }),
      });

      // Create an overlay
      const overlay = new ol.Overlay({
        element: document.getElementById("overlay"),
        positioning: "bottom-center",
        offset: [0, -10],
      });
      map.addOverlay(overlay);

      // Create a feature
      const iconFeature = new ol.Feature({
        geometry: new ol.geom.Point(ol.proj.fromLonLat([0, 0])),
      });

      // Create the icon style
      const iconStyle = new ol.style.Style({
        image: new ol.style.Icon({
          src: "icon.png",
          scale: 0.5,
        }),
      });
      iconFeature.setStyle(iconStyle);

      // Add the feature to a source
      const vectorSource = new ol.source.Vector({
        features: [iconFeature],
      });

      // Create the vector layer
      const vectorLayer = new ol.layer.Vector({
        source: vectorSource,
      });
      map.addLayer(vectorLayer);

      // Add click event to show/hide the overlay
      map.on("click", function (event) {
        const feature = map.forEachFeatureAtPixel(event.pixel, function (
          feature
        ) {
          return feature;
        });

        if (feature) {
          const coordinates = feature.getGeometry().getCoordinates();
          overlay.setPosition(coordinates);
          overlay.getElement().innerHTML = "This is an overlay";
          overlay.getElement().style.display = "block";
        } else {
          overlay.getElement().style.display = "none";
        }
      });
    </script>
  </body>
</html>
